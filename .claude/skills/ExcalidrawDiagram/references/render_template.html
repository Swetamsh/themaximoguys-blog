<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Excalidraw Renderer</title>
  <style>
    body { margin: 0; padding: 0; background: white; }
    #excalidraw-svg { display: inline-block; }
  </style>
</head>
<body>
  <div id="excalidraw-svg"></div>
  <script type="module">
    import { exportToSvg } from "https://esm.sh/@excalidraw/excalidraw@0.17.0?bundle";

    window.__renderComplete = false;

    window.renderDiagram = async function(data) {
      try {
        const svg = await exportToSvg({
          elements: data.elements || [],
          appState: {
            viewBackgroundColor: data.appState?.viewBackgroundColor || "#ffffff",
            exportWithDarkMode: false,
            exportBackground: true,
          },
          files: data.files || {},
        });

        const container = document.getElementById("excalidraw-svg");
        container.innerHTML = "";
        container.appendChild(svg);
        window.__renderComplete = true;
      } catch (err) {
        console.error("Render error:", err);
        document.body.innerText = "Render failed: " + err.message;
        window.__renderComplete = true;
      }
    };
  </script>
</body>
</html>
